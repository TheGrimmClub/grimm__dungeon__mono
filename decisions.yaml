# TheGrimmClub — decisions (living source of truth, ADR-style)
# Referenced and updated as the project evolves. IDs are stable.
# status: proposed | accepted | superseded
meta:
  updated: 2026-06-06

decisions:
  - id: D001
    title: Narrative language
    decision: >
      German narrative/story/riddles; English for the whole command surface — slash
      commands AND game verbs/directions (look, go north, inspect, wear). Rule of thumb:
      you TYPE English, the world ANSWERS in German.
    status: accepted
    date: 2026-06-06
    rationale: Immersive for Kassel/Hessen students; technical surface stays authentic.
    requirements: [R009]

  - id: D002
    title: Runtime and delivery
    decision: One downloadable grimm binary per OS; installing git/Python/Go is "Quest 0".
    status: accepted
    date: 2026-06-06
    rationale: Simplest distribution; environment setup itself becomes a first lesson.
    requirements: [R010]

  - id: D003
    title: Puzzle check model
    decision: Three kinds — answer, artifact, behavioral (language-agnostic via I/O).
    status: accepted
    date: 2026-06-06
    rationale: A Puzzle = prompt + acceptance check; the validator is the core abstraction.
    requirements: [R005]

  - id: D004
    title: Content authoring format
    decision: Multi-document YAML embedded via embed.FS; checks as named Go validators.
    status: accepted
    date: 2026-06-06
    rationale: Fast to author, type-safe-ish, logic stays in Go.
    requirements: [R011]

  - id: D005
    title: Student file storage
    decision: Student work lives in their own git repo, driven by alchemist potion verbs.
    status: accepted
    date: 2026-06-06
    rationale: Versioning is the proof-of-work that artifact checks validate to open doors.
    requirements: [R006]

  - id: D006
    title: alchemist placement and language
    decision: >
      Shared library (internal/alchemist) exposed as both cmd/alchemist and /alchemist.
      Implemented in Go over git (Init/Add/Brew/Bottle/Discard/Clean/Look via internal/
      runner) so grimm stays a single binary and can introspect the repo for artifact
      checks. NOTE: the user's original alchemist was a Python prototype (uv/pytest); this
      Go reimplementation supersedes it for the monorepo. The Python tool can be retired
      or kept as a separate standalone — open, low-stakes.
    status: accepted
    date: 2026-06-07
    rationale: One codebase, single binary, both the standalone tool and the in-game surface.
    requirements: [R006, R007]

  - id: D020
    title: Student work directory
    decision: >
      The student's repo lives at ~/.grimm/work (next to the save), created on launch and
      passed to the engine (artifact/behavioral checks) and to /alchemist. Phase 3 wires
      the first artifact-gated door (Archiv), opened by `/alchemist init` then `solve`. The
      brew/bottle-gated doors and the "submit your remote repo URL" check arrive once the
      student can create files in-game (Phase 4 editor/terminal).
    status: accepted
    date: 2026-06-07
    rationale: A real repo makes version control the literal key to a door (R006).
    requirements: [R005, R006]

  - id: D007
    title: Module path
    decision: github.com/TheGrimmClub/grimm__dungeon__mono (matches the git remote/org).
    status: accepted
    date: 2026-06-06
    rationale: Resolved from the existing origin remote.

  - id: D008
    title: Git workflow — commit then branch before every change
    decision: >
      Before starting any change/phase, commit the open files (clean checkpoint), then
      create a new branch for the upcoming work. Each change lands on its own branch.
    status: accepted
    date: 2026-06-06
    rationale: Keeps history reviewable and revertible.

  - id: D013
    title: Bubble Tea UI pulled forward to now
    decision: >
      Adopt Bubble Tea (+ bubbles, lipgloss) as the input/render layer immediately,
      ahead of its original Phase 5 slot. The engine stays a pure string-in/string-out
      core; a UI-independent `session` package owns dispatch; `tui` is a thin view.
      Enables arrow-key history and the headlamp colour "aha" (wearing the Helm lights
      the dungeon in colour) now.
    status: accepted
    date: 2026-06-06
    rationale: Player-requested; faster wins and the first colour aha. Phase 5 becomes polish.
    requirements: [R008]

  - id: D014
    title: Numbered item selection + inventory hotbar
    decision: >
      Room items are listed as [1..n]; the inventory is a 10-slot hotbar [1..0]. Verbs
      accept a number or a name (take 1 / take helm). Numbers resolve against room items
      first, then the inventory.
    status: accepted
    date: 2026-06-06
    rationale: Fast selection; teaches indexing implicitly.

  - id: D015
    title: Player addressed as "Human" until a class is chosen
    decision: >
      New players are addressed as "Human" (prompt "Human> "). Later they pick a class
      (Alchemist, Hunter, …) which changes the title. Implemented in Phase 2 via the
      `/class` command; classes currently only change the title, abilities come later.
    status: accepted
    date: 2026-06-06
    rationale: Cooler and class-neutral at the start; sets up a future class system.

  - id: D017
    title: Head-up display (HUD) as a helmet feature
    decision: >
      The helmet (item flag hud:true) unlocks a right-hand HUD in the Bubble Tea UI: an
      inventory box over a map (move-options) box, both lipgloss-bordered. Like the
      headlamp colour, it appears when the helmet is worn; it degrades to the full-width
      view when the helmet is off or the terminal is narrower than 64 cols. Engine exposes
      structured state (HUDActive/RoomTitle/ExitsView/InventoryView); the tui renders it.
    status: accepted
    date: 2026-06-07
    rationale: A real game-feel display, and a natural reward for the helmet line (colour -> HUD).
    requirements: [R008]

  - id: D018
    title: Read-aloud narration now (TTS); voice input (STT) later
    decision: >
      Narrate the German text via the OS voice (macOS say, Linux espeak/spd-say, Windows
      SAPI) behind a voice.Player interface with a Noop fallback, toggled by /voice and
      announced by the helmet. macOS German voice via GRIMM_VOICE=Anna. Speech-to-text
      (voice commands) is deferred to its own later investigation (whisper.cpp or cloud).
    status: accepted
    date: 2026-06-07
    rationale: Read-aloud is offline, dependency-light and matches "read the content"; STT is a big, separate lift.
    requirements: [R008]

  - id: D019
    title: Sound effects engine via Go audio (beep/oto) — planned next
    decision: >
      Music/SFX will use a Go audio library (gopxl/beep + ebitengine/oto). NOT yet
      implemented. It pulls native audio bindings (CoreAudio/WASAPI via purego; Linux ALSA
      needs CGO + libasound2-dev), so it must land behind a build tag with a Noop default
      so the dependency-free build and CI stay green, plus a dedicated audio-typecheck CI
      job and updated cross-compile. Cues can be synthesized (beep generators) to avoid
      sourcing audio assets initially.
    status: proposed
    date: 2026-06-07
    rationale: Honour the chosen approach while protecting the clean single-binary build and CI.
    requirements: [R008]

  - id: D016
    title: Puzzle attempt model — locked doors + `solve`
    decision: >
      An exit may reference a puzzle (`puzzle:` in YAML); going there shows the prompt and
      makes it the active puzzle. The player answers with `solve <…>` (free text also works
      while a puzzle is active). The three check kinds (D003) live in internal/puzzle and run
      via internal/runner. Checks currently run synchronously inside session.Submit — fine
      for riddles and fast shell checks; long-running checks (real git/network, heavy
      programs) should move to an async tea.Cmd before they're placed in the main path.
    status: accepted
    date: 2026-06-06
    rationale: Simple, discoverable gating; the Check abstraction backs doors, loot and battles.
    requirements: [R003, R005, R013]

  # --- Open / deferred (recorded as proposed; confirm before implementing) ---
  - id: D009
    title: /terminal model
    decision: Real OS shell scoped to the student's repo workdir (vs a simulated mini-shell).
    status: proposed
    date: 2026-06-06
    rationale: Real git/Python/Go are needed anyway; keeps the "real power" feel. Phase 4.
    requirements: [R007]

  - id: D010
    title: Communicator contract
    decision: TBD — stdin/stdout vs HTTP for the student-built communicator plug-in.
    status: proposed
    date: 2026-06-06
    rationale: Deferred to Phase 6.
    requirements: [R012]

  - id: D011
    title: Game-save location
    decision: Local save file at ~/.grimm/save.yaml (implemented in Phase 1).
    status: accepted
    date: 2026-06-06
    rationale: Keeps game progress separate from student work artifacts (D005).
    requirements: [R006]

  - id: D012
    title: Adopt Task (taskfile.dev) as runner and in-game concept
    decision: >
      Task is the canonical task runner (Taskfile.yaml at the repo root; the Makefile is
      removed; CI runs `task ci`). Task is also a teaching subject: automation appears in
      the fiction as "rituals". Phase 1 seeds a readable in-world Taskfile (the Ritualbuch
      item); Phase 2 will add an interactive automation puzzle.
    status: accepted
    date: 2026-06-06
    rationale: One real, cross-platform automation tool serves both project hygiene and curriculum.
    requirements: [R013]
    supersedes: makefile-from-phase-0
